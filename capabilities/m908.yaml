model: "908"                 # exact string passed to mouse_m908 -M
usb:
  vid: 0x04d9
  pids: [0xfc4d]
num_profiles: 5
num_macro_slots: 15
led:
  lightmodes: [breathing, breathing_rainbow, rainbow, static, wave,
               alternating, reactive, reactive_button, flashing, "off", random]
  brightness_range: [1, 3]
  speed_range: [1, 8]
  speed_readback_reliable: false   # -R dumps have been observed reporting speed=0 regardless of actual setting
  scrollspeed_range: [1, 0x3f]     # settable, but...
  scrollspeed_readback_reliable: false   # ...the tool's own -R output warns reading scrollspeed isn't supported
report_rates: [125, 250, 500, 1000]
dpi:
  formats: [actual, bytecode]
  actual_range: [200, 12400]
  actual_step_breakpoints: [[200, 6200, 100], [6400, 12400, 200]]
  num_slots: 5
  min_enabled: 1             # can't disable all 5
buttons:
  supported: false           # v2
  count: 20
  names: [button_left, button_right, button_middle, button_fire, button_dpi_up,
          button_dpi_down, button_1, button_2, button_3, button_4, button_5,
          button_6, button_7, button_8, button_9, button_10, button_11,
          button_12, scroll_up, scroll_down]
macros:
  supported: false           # v2
quirks:
  - "Reference/baseline implementation that most other m908-family models' DPI and lightmode code is copy-derived from."
