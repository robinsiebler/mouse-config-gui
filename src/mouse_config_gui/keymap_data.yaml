# Structured button-mapping grammar data, transcribed from design_docs/keymap.md
# (the human-readable reference doc -- keep both in sync when mouse_m908 adds new
# tokens). Loaded by keymap.py via importlib.resources, same pattern capability.py
# uses for capabilities/*.yaml.

modifiers:
  - ctrl_l
  - shift_l
  - alt_l
  - super_l
  - ctrl_r
  - shift_r
  - alt_r
  - super_r

