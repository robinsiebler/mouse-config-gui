# Mousebuttons and special functions (affect the mouse itself, no key event sent).
mouse_and_special:
  - forward
  - backward
  - dpi+
  - dpi-
  - dpi-cycle
  - report_rate+
  - report_rate-
  - scroll_up
  - scroll_down
  - left
  - right
  - middle
  - profile_switch
  - profile+
  - profile-
  - led_mode_switch
  - dpi_led_toggle
  - reset_settings
  - none

# Media controls -- kept for compatibility; keymap.md recommends the Media_*
# keyboard keys (in `keys` above) over these where possible.
media:
  - media_play
  - media_stop
  - media_previous
  - media_next
  - media_volume_up
  - media_volume_down
  - media_mute

# Only handled by the official software and mostly redundant.
compatibility:
  - compatibility_cut
  - compatibility_copy
  - compatibility_paste
  - compatibility_select_all
  - compatibility_find
  - compatibility_new
  - compatibility_print
  - compatibility_save
  - compatibility_switch_window
  - compatibility_close_window
  - compatibility_open_explorer
  - compatibility_run
  - compatibility_show_desktop
  - compatibility_lock_pcme
  - compatibility_browser_home
  - compatibility_browser_backward
  - compatibility_browser_forward
  - compatibility_browser_stop
  - compatibility_browser_refresh
  - compatibility_browser_search
  - compatibility_browser_favorite
  - compatibility_mail

# Valid ⟨button⟩ targets for fire:⟨button⟩:⟨repeats⟩:⟨delay⟩, in addition to
# any entry in `keys`.
fire_buttons:
  - mouse_left
  - mouse_right
  - mouse_middle