name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # None of tests/*.py import gi/Gtk (deliberate -- widget modules like
      # window.py/button_group.py have no dedicated tests, only the
      # pure-Python core does), so no display/Xvfb is needed here. These
      # packages are only to let `pip install` build PyGObject itself, which
      # is a hard dependency in pyproject.toml regardless -- same system
      # packages the README's "Requirements" section already documents for
      # local dev.
      - name: Install PyGObject/GTK4 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libcairo2-dev \
            pkg-config \
            python3-dev

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest
